<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Desktop Lyrics</title>
  <style>
    :root{
      --lyric-primary:#f6fdff;
      --lyric-secondary:#a8f6ff;
      --lyric-highlight:#fff0b8;
      --lyric-glow:#9cffdf;
      --lyric-font:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      --lyric-weight:900;
      --lyric-letter-spacing:0px;
      --lyric-line-height:1;
      --lyric-size:58px;
      --lyric-progress:0%;
      --lyric-feather:5.5%;
      --lyric-fit-x:1;
      --lyric-scroll-x:0px;
      --lyric-edge-width:92px;
      --lyric-mask-edge-width:92px;
      --lyric-vertical-feather:46px;
      --lyric-css-beat-glow:0px;
      --lyric-shadow-soft:rgba(156,255,223,.34);
      --lyric-shadow-glow:rgba(156,255,223,.26);
      --lyric-shadow-hot:rgba(255,240,184,.22);
      --lyric-edge:rgba(4,6,12,.42);
      --lyric-drop:rgba(156,255,223,.38);
      --lyric-drop-paused:rgba(156,255,223,.22);
    }
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;user-select:none}
    body{opacity:0;transition:opacity .22s ease;-webkit-app-region:no-drag}
    body.show{opacity:1}
    canvas{display:none}
    .wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 12px;pointer-events:none}
    .stage{
      position:relative;
      max-width:calc(100vw - 24px);
      padding:104px 86px 94px;
      box-sizing:border-box;
      pointer-events:auto;
      cursor:default;
      transform-style:preserve-3d;
      transform-origin:center;
      will-change:transform,filter;
      contain:layout style;
      backface-visibility:hidden;
      -webkit-app-region:no-drag;
    }
    body.unlocked .stage{cursor:move}
    body.unlocked .stage.hint-visible{cursor:move;-webkit-app-region:no-drag}
    .lyric-viewport{
      position:relative;
      z-index:2;
      display:block;
      width:min(100%,1120px);
      max-width:calc(100vw - 24px);
      margin:0 auto;
      padding:1.24em var(--lyric-edge-width) 1.34em;
      box-sizing:border-box;
      overflow:hidden;
      text-align:center;
      pointer-events:none;
      isolation:isolate;
      -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 var(--lyric-mask-edge-width),#000 calc(100% - var(--lyric-mask-edge-width)),transparent 100%);
      mask-image:linear-gradient(90deg,transparent 0,#000 var(--lyric-mask-edge-width),#000 calc(100% - var(--lyric-mask-edge-width)),transparent 100%);
      filter:drop-shadow(0 1px 2.4px rgba(4,6,12,.58)) drop-shadow(0 0 4.8px rgba(4,6,12,.30));
      transform:translateZ(0);
      will-change:transform,filter;
    }
    body.unlocked .stage.hint-visible .lyric-viewport{pointer-events:auto;cursor:move;-webkit-app-region:no-drag}
    .lyric-scroll{
      display:inline-block;
      transform:translate3d(var(--lyric-scroll-x),0,0) scaleX(var(--lyric-fit-x));
      transform-origin:center;
      will-change:transform;
      backface-visibility:hidden;
    }
    .line{
      position:relative;
      z-index:2;
      display:inline-block;
      max-width:none;
      color:#fff;
      font-family:var(--lyric-font);
      font-size:var(--lyric-size);
      font-weight:var(--lyric-weight);
      line-height:var(--lyric-line-height);
      letter-spacing:var(--lyric-letter-spacing);
      text-align:center;
      white-space:nowrap;
      overflow:visible;
      text-overflow:clip;
      padding:.20em .12em .34em;
      margin:-.20em -.12em -.34em;
      background:linear-gradient(90deg,var(--lyric-primary),var(--lyric-primary));
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      -webkit-text-stroke:.18px rgba(255,255,255,.72);
      paint-order:stroke fill;
      text-shadow:0 0 1px rgba(255,255,255,.34),0 0 calc(6px + var(--lyric-css-beat-glow)) var(--lyric-shadow-soft),0 0 calc(14px + var(--lyric-css-beat-glow)) var(--lyric-shadow-glow);
      filter:none;
      opacity:0;
      transform:translate3d(0,0,0);
      transform-origin:center;
      backface-visibility:hidden;
      will-change:opacity,filter,transform,background;
    }
    body.highlight .line{
      background:linear-gradient(90deg,
        var(--lyric-highlight) 0%,
        var(--lyric-highlight) max(0%,calc(var(--lyric-progress) - var(--lyric-feather))),
        var(--lyric-glow) calc(var(--lyric-progress) + 1.2%),
        var(--lyric-primary) calc(var(--lyric-progress) + var(--lyric-feather)),
        var(--lyric-primary) 100%);
      -webkit-background-clip:text;
      background-clip:text;
    }
    .line.in{animation:lyr-in 820ms cubic-bezier(.16,.84,.32,1.02) forwards}
    body.paused .line{filter:none;opacity:.84}
    .lock-hint{
      position:absolute;
      z-index:4;
      left:50%;
      top:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      min-width:92px;
      min-height:30px;
      padding:0 11px;
      border-radius:999px;
      border:1px solid color-mix(in srgb,var(--lyric-glow) 58%,rgba(255,255,255,.36));
      background:rgba(4,6,10,.44);
      color:rgba(255,255,255,.84);
      font:800 12px/1 "Microsoft YaHei",sans-serif;
      text-shadow:0 1px 10px rgba(0,0,0,.55);
      box-shadow:0 0 20px color-mix(in srgb,var(--lyric-glow) 30%,transparent),inset 0 1px 0 rgba(255,255,255,.16);
      opacity:0;
      pointer-events:none;
      transform:translateX(-50%) translateY(-8px) scale(.92);
      transition:opacity .16s ease,transform .16s ease;
      -webkit-app-region:no-drag;
    }
    .lock-icon{
      position:relative;
      width:13px;
      height:13px;
      flex:0 0 auto;
    }
    .lock-icon::before{content:"";position:absolute;left:2px;bottom:1px;width:9px;height:7px;border:1.7px solid var(--lyric-highlight);border-radius:2px;box-sizing:border-box}
    .lock-icon::after{content:"";position:absolute;left:3px;top:0;width:7px;height:8px;border:1.7px solid var(--lyric-highlight);border-bottom:0;border-radius:7px 7px 0 0;box-sizing:border-box}
    body.unlocked .lock-icon::after{left:7px;transform:rotate(24deg);transform-origin:left bottom}
    .lyrics-close{
      display:none;
      align-items:center;
      justify-content:center;
      height:22px;
      width:auto;
      margin-right:-4px;
      border:0;
      border-left:1px solid rgba(255,255,255,.14);
      padding:0 0 1px 9px;
      background:transparent;
      color:rgba(255,255,255,.82);
      font:800 12px/1 "Microsoft YaHei",sans-serif;
      cursor:pointer;
      text-shadow:0 0 12px var(--lyric-primary);
      -webkit-app-region:no-drag;
    }
    .lyrics-close:hover{color:#fff}
    body.unlocked .lyrics-close{display:flex}
    body.unlocked .stage.hint-visible .lock-hint{pointer-events:auto;-webkit-app-region:no-drag}
    .stage.hint-visible .lock-hint{opacity:.94;transform:translateX(-50%) translateY(0) scale(1)}
    @keyframes lyr-in{
      0%{opacity:0;transform:translate3d(0,32px,-120px) rotateX(24deg) rotateY(-18deg) scale(.78);filter:blur(12px)}
      58%{opacity:1;filter:blur(0)}
      100%{opacity:1;transform:translate3d(0,0,0) rotateX(0deg) rotateY(0deg) scale(1);filter:blur(0)}
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div class="wrap">
    <div id="stage" class="stage">
      <div id="lyricViewport" class="lyric-viewport"><div id="lyricScroller" class="lyric-scroll"><div id="line" class="line" data-text="Mineradio">Mineradio</div></div></div>
      <div id="lockHint" class="lock-hint"><span class="lock-icon"></span><span id="lockText">&#20013;&#38190;&#35299;&#38145;</span><button id="closeLyricsBtn" class="lyrics-close" type="button" aria-label="Close desktop lyrics">&#20851;&#38381;&#26700;&#38754;&#27468;&#35789;</button></div>
    </div>
  </div>
  <script>
    'use strict';
    var canvas = document.getElementById('fx');
    var ctx = canvas.getContext('2d');
    var stage = document.getElementById('stage');
    var lyricViewport = document.getElementById('lyricViewport');
    var line = document.getElementById('line');
    var lockHint = document.getElementById('lockHint');
    var lockText = document.getElementById('lockText');
    var closeLyricsBtn = document.getElementById('closeLyricsBtn');
    var dpr = 1;
    var lastText = '';
    var progressText = '';
    var displayedProgress = 0;
    var baseFontSize = 58;
    var renderedFontSize = 58;
    var fitScaleX = 1;
    var hoverCapture = false;
    var dragging = false;
    var dragPointerId = null;
    var dragLast = { x:0, y:0 };
    var lastDrawAt = 0;
    var layoutKey = '';
    var hoverInside = false;
    var hintVisible = false;
    var hintTimer = 0;
    var lastPointerEvent = null;
    var scrollState = { needed:false, overflow:0, limit:0, offset:0, dir:-1, holdUntil:0, lastAt:0 };
    var particles = [];
    var live = { solar:0, beat:0, bass:0, scale:1, glow:0, spark:0, lift:0 };
    var state = {
      enabled:false,text:'Mineradio',progress:0,progressSpan:4.8,progressReceivedAt:0,playing:false,
      playbackTime:0,playbackDuration:0,playbackRate:1,playbackReceivedAt:0,beatMapKey:'',
      size:1,opacity:.92,clickThrough:true,lyricGlowParticles:false,cinema:true,highlightFollow:false,frameRate:60,
      lyricGlow:true,lyricGlowBeat:true,lyricGlowStrength:.35,highBloom:0,beatGlow:0,beatPulse:0,bass:0,feather:.055,
      fontFamily:'Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif',
      fontWeight:900,letterSpacing:0,lineHeight:1,lyricScale:1,
      colors:{primary:'#f6fdff',secondary:'#a8f6ff',highlight:'#fff0b8',glow:'#9cffdf'},
      displayColors:{primary:'#f6fdff',secondary:'#a8f6ff',highlight:'#fff0b8',glow:'#9cffdf'}
    };
    var desktopBeat = {
      key:'',
      map:null,
      camera:[],
      pulse:[],
      events:[],
      cameraIdx:0,
      pulseIdx:0,
      prevTime:-1,
      lastTriggerAt:-10,
      pulseDrive:0,
      glowDrive:0,
      bassDrive:0,
      lookahead:.075
    };
    var DESKTOP_BEAT_COMBOS = ['', 'downbeat', 'push', 'drop', 'rebound', 'accent'];
    function clamp(value, min, max, fallback) {
      var n = Number(value);
      if (!isFinite(n)) n = fallback;
      return Math.max(min, Math.min(max, n));
    }
    function rand(seed){ return Math.abs(Math.sin(seed * 9283.173) * 43758.5453) % 1; }
    function isLocked(){ return state.clickThrough !== false; }
    function setRootVar(name, value){ document.documentElement.style.setProperty(name, value); }
    var colorCtx = document.createElement('canvas').getContext('2d');
    function parseCssColor(color, fallback) {
      fallback = fallback || '#ffffff';
      try {
        colorCtx.fillStyle = fallback;
        var safe = colorCtx.fillStyle;
        colorCtx.fillStyle = String(color || fallback);
        var css = colorCtx.fillStyle || safe;
        var hex = css.match(/^#([0-9a-f]{6})$/i);
        if (hex) {
          var n = parseInt(hex[1], 16);
          return { r:(n >> 16) & 255, g:(n >> 8) & 255, b:n & 255, a:1 };
        }
        var rgb = css.match(/^rgba?\(\s*([.\d]+)\s*,\s*([.\d]+)\s*,\s*([.\d]+)(?:\s*,\s*([.\d]+))?/i);
        if (rgb) return { r:Math.round(rgb[1]), g:Math.round(rgb[2]), b:Math.round(rgb[3]), a:rgb[4] == null ? 1 : clamp(rgb[4], 0, 1, 1) };
      } catch (e) {}
      return { r:255, g:255, b:255, a:1 };
    }
    function liftedLyricColor(color, fallback, minLum) {
      var c = parseCssColor(color, fallback);
      var lum = (c.r * 0.299 + c.g * 0.587 + c.b * 0.114) / 255;
      var floor = minLum == null ? .34 : minLum;
      if (lum < floor) {
        var lift = Math.round((floor - lum) * 255);
        c.r = Math.min(255, c.r + lift);
        c.g = Math.min(255, c.g + lift);
        c.b = Math.min(255, c.b + lift);
      }
      return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
    }
    function normalizeLyricColor(color, fallback) {
      var c = parseCssColor(color, fallback);
      return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
    }
    function colorWithAlpha(color, alpha) {
      var c = parseCssColor(color, '#ffffff');
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + clamp(alpha, 0, 1, 1) + ')';
    }
    function unpackDesktopBeatEvent(row) {
      if (typeof row === 'number') {
        return { time:row, strength:.42, confidence:.72, impact:.42, low:.62, body:.22, snap:.16, primary:true, camera:true, pulse:true, mass:.62, sharpness:.12 };
      }
      if (!Array.isArray(row)) {
        row = row || {};
        return {
          time:Number(row.time) || 0,
          strength:row.strength == null ? .42 : Number(row.strength),
          confidence:row.confidence == null ? .72 : Number(row.confidence),
          impact:row.impact == null ? (row.strength == null ? .42 : Number(row.strength)) : Number(row.impact),
          low:row.low == null ? .62 : Number(row.low),
          body:row.body == null ? .22 : Number(row.body),
          snap:row.snap == null ? .16 : Number(row.snap),
          combo:row.combo || undefined,
          primary:row.primary !== false,
          camera:row.camera !== false,
          pulse:row.pulse !== false,
          dj:!!row.dj,
          grid:!!row.grid,
          kickOnly:!!row.kickOnly,
          mass:row.mass == null ? .62 : Number(row.mass),
          sharpness:row.sharpness == null ? .12 : Number(row.sharpness),
          step:row.step || 0
        };
      }
      var flags = row[8] || 0;
      return {
        time:row[0] || 0,
        strength:row[1] == null ? .42 : row[1],
        confidence:row[2] == null ? .72 : row[2],
        impact:row[3] == null ? (row[1] || .42) : row[3],
        low:row[4] == null ? .62 : row[4],
        body:row[5] == null ? .22 : row[5],
        snap:row[6] == null ? .16 : row[6],
        combo:DESKTOP_BEAT_COMBOS[row[7] || 0] || undefined,
        primary:!!(flags & 1),
        camera:!!(flags & 2),
        pulse:!!(flags & 4),
        dj:!!(flags & 8),
        grid:!!(flags & 16),
        kickOnly:!!(flags & 32),
        mass:row[9] == null ? .62 : row[9],
        sharpness:row[10] == null ? .12 : row[10],
        step:row[11] || 0
      };
    }
    function desktopBeatEventTime(ev) {
      return ev && isFinite(ev.time) ? Number(ev.time) : 0;
    }
    function sortDesktopBeatEvents(list) {
      return (list || [])
        .map(unpackDesktopBeatEvent)
        .filter(function(ev){ return ev && isFinite(ev.time) && ev.time >= 0; })
        .sort(function(a,b){ return desktopBeatEventTime(a) - desktopBeatEventTime(b); });
    }
    function clearDesktopBeatMap(key) {
      desktopBeat.key = key || '';
      desktopBeat.map = null;
      desktopBeat.camera = [];
      desktopBeat.pulse = [];
      desktopBeat.events = [];
      desktopBeat.cameraIdx = 0;
      desktopBeat.pulseIdx = 0;
      desktopBeat.prevTime = -1;
      desktopBeat.lastTriggerAt = -10;
      desktopBeat.pulseDrive = 0;
      desktopBeat.glowDrive = 0;
      desktopBeat.bassDrive = 0;
    }
    function normalizeDesktopBeatMapPayload(packed) {
      if (!packed) return null;
      var camera = sortDesktopBeatEvents(packed.cameraBeats || packed.beats || packed.kicks || []);
      var pulse = sortDesktopBeatEvents(packed.pulseBeats || packed.kicks || []);
      return {
        cameraBeats:camera,
        pulseBeats:pulse,
        duration:Number(packed.duration) || 0,
        partialUntilSec:Number(packed.partialUntilSec) || 0,
        visualBeatCount:Number(packed.visualBeatCount) || camera.length,
        tempoSource:packed.tempoSource || 'local'
      };
    }
    function syncDesktopBeatCursor(t, preserve) {
      t = isFinite(t) ? Math.max(0, t) : 0;
      desktopBeat.cameraIdx = 0;
      desktopBeat.pulseIdx = 0;
      while (desktopBeat.cameraIdx < desktopBeat.camera.length && desktopBeatEventTime(desktopBeat.camera[desktopBeat.cameraIdx]) < t - .040) desktopBeat.cameraIdx++;
      while (desktopBeat.pulseIdx < desktopBeat.pulse.length && desktopBeatEventTime(desktopBeat.pulse[desktopBeat.pulseIdx]) < t - .026) desktopBeat.pulseIdx++;
      desktopBeat.events = [];
      desktopBeat.prevTime = t;
      desktopBeat.lastTriggerAt = t - .42;
      if (!preserve) {
        desktopBeat.pulseDrive = 0;
        desktopBeat.glowDrive = 0;
        desktopBeat.bassDrive = 0;
      }
    }
    function applyDesktopPlayback(payload) {
      if (!payload) return;
      state.playbackTime = Math.max(0, Number(payload.time) || 0);
      state.playbackDuration = Math.max(0, Number(payload.duration) || 0);
      state.playbackRate = clamp(Number(payload.rate) || 1, .25, 4, 1);
      state.playbackReceivedAt = performance.now();
    }
    function currentDesktopPlaybackTime(nowMs) {
      var t = Math.max(0, Number(state.playbackTime) || 0);
      if (state.playing) t += Math.max(0, nowMs - (state.playbackReceivedAt || nowMs)) * .001 * clamp(state.playbackRate, .25, 4, 1);

      return t;
    }
    function applyDesktopBeatMapPayload(next) {
      next = next || {};
      var key = next.beatMapKey == null ? desktopBeat.key : String(next.beatMapKey || '');
      var hasMapPayload = Object.prototype.hasOwnProperty.call(next, 'beatMap');
      if (!hasMapPayload && key === desktopBeat.key) return;
      if (!hasMapPayload) {
        clearDesktopBeatMap(key);
        return;
      }
      var map = normalizeDesktopBeatMapPayload(next.beatMap);
      if (!map || (!map.cameraBeats.length && !map.pulseBeats.length)) {
        clearDesktopBeatMap(key);
        return;
      }
      desktopBeat.key = key;
      desktopBeat.map = map;
      desktopBeat.camera = map.cameraBeats;
      desktopBeat.pulse = map.pulseBeats.length ? map.pulseBeats : map.cameraBeats;
      syncDesktopBeatCursor(currentDesktopPlaybackTime(performance.now()), false);
    }
    function beatEaseInOut(t) {
      t = clamp(t, 0, 1, 0);
      return t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }
    function scheduleDesktopBeatCamera(ev) {
      var time = desktopBeatEventTime(ev);
      if (!isFinite(time)) return;
      var strength = clamp(ev.strength == null ? .72 : ev.strength, 0, 1, .72);
      var confidence = clamp(ev.confidence == null ? .72 : ev.confidence, 0, 1, .72);
      var impact = clamp(ev.impact == null ? strength : ev.impact, 0, 1, strength);
      if (ev.primary === false && impact < .64) return;
      if (impact < .16 && strength < .52) return;
      if (confidence < .25 && strength < .66) return;

      var body = clamp(ev.body == null ? .22 : ev.body, 0, 1.2, .22);
      var snap = clamp(ev.snap == null ? .16 : ev.snap, 0, 1.2, .16);
      var mass = clamp(ev.mass == null ? (low * .72 + body * .34 + strength * .18) : ev.mass, 0, 1, .62);
      var sharpness = clamp(ev.sharpness == null ? snap : ev.sharpness, 0, 1, snap);
      var combo = ev.combo || (Math.floor(time * 2.7) % 4 === 0 ? 'downbeat' : undefined);
      var minGap = ev.dj ? Math.max(.245, Math.min(.430, ev.step ? ev.step * .54 : .315)) : .385;

      amp *= .72 + impact * .48;

      else if (combo === 'push') amp *= .84;
      else if (combo === 'drop') amp *= .98;
      else if (combo === 'rebound') amp *= .74;
      else if (combo === 'accent') amp *= 1.14;

      var hold = Math.max(.014, Math.min(.052, .030 * (.62 + low * .55 + body * .25)));
      var release = Math.max(.110, Math.min(.255, .185 * (.76 + mass * .56 + body * .18 - sharpness * .18)));
      if (ev.dj) {
        attack = Math.max(.010, attack * .72);
        hold = Math.max(.016, hold * .82);
        release = Math.max(.116, release * 1.04);
        amp *= 1.10;
      }
      desktopBeat.events.push({
        start:time - attack,
        hit:time,
        amp:Math.min(1, amp),
        attack:attack,
        hold:hold,
        release:release,
        low:low,
        body:body,
        snap:snap,
        mass:mass,
        combo:combo
      });
      if (desktopBeat.events.length > 10) desktopBeat.events.splice(0, desktopBeat.events.length - 10);
    }
    function triggerDesktopBeatPulse(ev) {
      var strength = clamp(ev.strength == null ? .42 : ev.strength, 0, 1, .42);
      var impact = clamp(ev.impact == null ? strength : ev.impact, 0, 1, strength);
      var low = clamp(ev.low == null ? .62 : ev.low, 0, 1.4, .62);
      var body = clamp(ev.body == null ? .22 : ev.body, 0, 1.2, .22);
      var combo = ev.combo;
      var lift = combo === 'downbeat' ? .08 : (combo === 'drop' ? .04 : 0);
      var pulse = .14 + strength * .46 + impact * .18 + body * .08 + lift;
      if (ev.dj) pulse = .12 + strength * .50 + impact * .28 + lift * .70;
      desktopBeat.pulseDrive = Math.max(desktopBeat.pulseDrive, Math.min(ev.dj ? .98 : .82, pulse));
      desktopBeat.glowDrive = Math.max(desktopBeat.glowDrive, Math.min(1.16, .18 + impact * .52 + strength * .28));
      desktopBeat.bassDrive = Math.max(desktopBeat.bassDrive, Math.min(1.08, low * (.40 + impact * .42) + body * .12));
    }
    function tickDesktopBeatMap(t, dt) {
      var hasMap = !!(desktopBeat.map && (desktopBeat.camera.length || desktopBeat.pulse.length));
      dt = clamp(dt, .001, .12, 1 / 60);
      if (!hasMap || !state.playing || state.cinema === false) {
        desktopBeat.pulseDrive *= Math.pow(.08, dt);
        desktopBeat.glowDrive *= Math.pow(.10, dt);
        desktopBeat.bassDrive *= Math.pow(.14, dt);
        desktopBeat.events = [];

        ctx.filter = 'blur(' + layers[i].blur + 'px)';
        ctx.globalAlpha = live.glow * layers[i].alpha * clamp(state.opacity, .28, 1, .92);
        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = layers[i].stroke;
        ctx.lineJoin = 'round';
        drawCanvasText(text, 0, 0, renderedFontSize, spacing, true);
        drawCanvasText(text, 0, 0, renderedFontSize, spacing, false);
        ctx.restore();
      }
      ctx.restore();
    }
    function drawParticles(rect, motion, now) {
      var target = state.lyricGlow && state.lyricGlowParticles ? Math.min(.50, (.12 + live.solar * .18 + live.beat * .16) * Math.min(1.7, motion.glowDrive)) : 0;
      live.spark += (target - live.spark) * (target > live.spark ? .14 : .08);
      if (live.spark <= .006) return;
      ensureParticles();
      var width = Math.max(300, Math.min(innerWidth - 48, rect.width * 1.16 + 140));
      var height = Math.max(74, rect.height * 1.34);
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2 + Math.sin(now * .55) * 3.5;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var i=0;i<particles.length;i++) {
        var p = particles[i];
        var lane = Math.floor(p.lane * 5);
        var local = (p.lane * 5) % 1;
        var speed = .018 + rand(p.seed) * .030 + lane * .002;
        var flow = (p.phase + now * speed) % 1;
        var edge = Math.sin(Math.PI * flow);
        var x = cx + (flow - .5) * width * (1.02 + rand(p.seed * 4.1) * .18);
        var curve = Math.sin(flow * Math.PI * 2 * (.9 + rand(p.seed * 1.3) * .5) + p.seed + now * .32);
        var y = cy + (lane - 2) * height * .13 + curve * height * (.16 + rand(p.seed * 2.2) * .18) + (local - .5) * height * .13 + Math.sin(now * (.42 + rand(p.seed) * .32) + p.seed) * (4 + live.beat * 6);
        var tw = Math.pow(.5 + .5 * Math.sin(now * (.7 + rand(p.seed) * .4) + p.seed), 4);
        var r = Math.max(.7, p.size * (.75 + edge * 1.45 + tw * .85 + live.beat * .55));
        var grad = ctx.createRadialGradient(x,y,0,x,y,r*4.5);
        grad.addColorStop(0, colorWithAlpha(state.displayColors.highlight, .96));
        grad.addColorStop(.34, colorWithAlpha(state.displayColors.glow, .68));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = live.spark * (0.16 + edge * .44 + tw * .24) * clamp(state.opacity, .28, 1, .92);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x,y,r*4.5,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    function draw(nowMs){
      if (state.enabled) {
        var interval = frameIntervalMs();
        if (interval > 0 && lastDrawAt && nowMs - lastDrawAt < Math.max(4, interval - 1.25)) {
          scheduleNextDraw();
          return;
        }
      }
      var dt = lastDrawAt ? Math.min(.12, Math.max(.001, (nowMs - lastDrawAt) / 1000)) : 1 / 60;
      lastDrawAt = nowMs;
      var now = nowMs * .001;
      if (state.enabled) {
        var progress = currentDisplayProgress();
        setRootVar('--lyric-progress', (progress * 100).toFixed(2) + '%');
        var offlineMotion = tickDesktopBeatMap(currentDesktopPlaybackTime(nowMs), dt);
        var motion = updateMotion(now, offlineMotion);
        applyStageMotion(now);
        updateLyricScroll(nowMs, progress);
      }
      scheduleNextDraw();
    }
    function scheduleNextDraw() {
      if (!state.enabled) {
        setTimeout(function(){ requestAnimationFrame(draw); }, 250);
        return;
      }
      requestAnimationFrame(draw);
    }
    function normalizeFrameRate(value) {
      var n = Number(value);
      if (!isFinite(n) || n <= 0) return 0;
      if (n <= 26) return 24;
      if (n <= 45) return 30;
      if (n <= 90) return 60;
      return 120;
    }
    function frameIntervalMs() {
      var fps = normalizeFrameRate(state.frameRate);
      return fps > 0 ? 1000 / fps : 0;
    }
    function pointInRect(evt, rect, padX, padY) {
      return evt.clientX >= rect.left - padX && evt.clientX <= rect.right + padX && evt.clientY >= rect.top - padY && evt.clientY <= rect.bottom + padY;
    }
    function pointInStage(evt) {
      if (!state.enabled || !evt) return false;
      if (dragging) return true;
      if (!isLocked()) {
        var stageRect = stage.getBoundingClientRect();
        return pointInRect(evt, stageRect, 0, 0);
      }
      var padX = Math.max(24, Math.min(68, innerWidth * .034));
      var padY = Math.max(22, Math.min(46, innerHeight * .045));
      var lyricRect = lyricViewport.getBoundingClientRect();
      if (pointInRect(evt, lyricRect, padX, padY)) return true;
      var hintRect = lockHint.getBoundingClientRect();
      return pointInRect(evt, hintRect, 10, 10);
    }
    function setHintVisible(visible) {
      hintVisible = !!visible;
      stage.classList.toggle('hint-visible', hintVisible);
      setPointerCapture(!isLocked() && (hintVisible || dragging) && hoverInside);
    }
    function hideInteractionHint() {
      hoverInside = false;
      lastPointerEvent = null;
      if (hintTimer) {
        clearTimeout(hintTimer);
        hintTimer = 0;
      }
      setHintVisible(false);
      stage.classList.remove('hover');
    }
    function scheduleInteractionHint() {
      if (hintVisible || hintTimer) return;
      hintTimer = setTimeout(function(){
        hintTimer = 0;
        if (!hoverInside || !lastPointerEvent || !pointInStage(lastPointerEvent)) return;
        setHintVisible(true);
      }, 1500);
    }
    function updateHover(evt) {
      var inside = !!state.enabled && pointInStage(evt);
      hoverInside = inside;
      lastPointerEvent = evt || lastPointerEvent;
      stage.classList.toggle('hover', inside || dragging);
      if (isLocked()) {
        if (inside || dragging) {
          scheduleInteractionHint();
        } else {
          hideInteractionHint();
        }
        setPointerCapture(false);
        return inside;
      }
      if (inside || dragging) {
        scheduleInteractionHint();
      } else {
        hideInteractionHint();
      }
      setPointerCapture(inside || dragging);
      return inside;
    }
    function setLocked(locked) {
      state.clickThrough = !!locked;
      syncLockClasses();
      if (window.desktopOverlay && window.desktopOverlay.setLyricsLockState) {
        window.desktopOverlay.setLyricsLockState(!!locked).catch(function(){});
      }
    }
    function moveDrag(evt) {
      if (dragging && !isLocked() && window.desktopOverlay && window.desktopOverlay.moveLyricsBy) {
        var dx = evt.screenX - dragLast.x;
        var dy = evt.screenY - dragLast.y;
        dragLast.x = evt.screenX;
        dragLast.y = evt.screenY;
        if (dx || dy) window.desktopOverlay.moveLyricsBy(dx, dy).catch(function(){});
      }
    }
    function endDrag(evt) {
      if (!dragging) return;
      if (evt && dragPointerId != null && evt.pointerId != null && evt.pointerId !== dragPointerId) return;
      try {
        if (dragPointerId != null && stage.releasePointerCapture && stage.hasPointerCapture && stage.hasPointerCapture(dragPointerId)) {
          stage.releasePointerCapture(dragPointerId);
        }
      } catch (e) {}
      dragging = false;
      dragPointerId = null;
      setPointerCapture(false);
    }
    window.addEventListener('pointermove', function(evt){
      if (dragging && evt.buttons != null && (evt.buttons & 1) === 0) {
        endDrag(evt);
        updateHover(evt);
        return;
      }
      updateHover(evt);
      moveDrag(evt);
    });
    window.addEventListener('mousemove', function(evt){
      if (!dragging) updateHover(evt);
    });
    window.addEventListener('pointerleave', function(){
      if (dragging) {
        setPointerCapture(true);
        return;
      }
      hideInteractionHint();
    });
    window.addEventListener('mouseleave', function(){
      if (!dragging) hideInteractionHint();
    });
    window.addEventListener('pointerdown', function(evt){
      if (!pointInStage(evt)) return;
      if (closeLyricsBtn && closeLyricsBtn.contains(evt.target)) return;
      if (evt.button === 1) {
        evt.preventDefault();
        hideInteractionHint();
        return;
      }
      if (isLocked()) {
        hideInteractionHint();
        setPointerCapture(false);
        return;
      }
      if (evt.button === 0 && !isLocked()) {
        dragging = true;
        dragPointerId = evt.pointerId;
        dragLast.x = evt.screenX;
        dragLast.y = evt.screenY;
        setPointerCapture(true);
        try {
          if (stage.setPointerCapture) stage.setPointerCapture(evt.pointerId);
        } catch (e) {}
        evt.preventDefault();
      }
    });
    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);
    window.addEventListener('blur', function(){
      endDrag({ pointerId:dragPointerId });
      hideInteractionHint();
    });
    stage.addEventListener('lostpointercapture', endDrag);
    window.addEventListener('auxclick', function(evt){
      if (evt.button === 1 && pointInStage(evt)) evt.preventDefault();
    });
    if (closeLyricsBtn) {
      closeLyricsBtn.addEventListener('click', function(evt){
        evt.preventDefault();
        evt.stopPropagation();
        state.enabled = false;
        document.body.classList.remove('show');
        setPointerCapture(false);
        if (window.desktopOverlay && window.desktopOverlay.closeLyrics) {
          window.desktopOverlay.closeLyrics().catch(function(){});
        }
      });
    }
    window.__mineradioDesktopLyricsApplyState = applyState;
    window.addEventListener('message', function(event){
      var data = event && event.data;
      if (!data || data.type !== 'mineradio-desktop-lyrics-state') return;
      applyState(data.payload || {});
    });
    window.addEventListener('resize', resize);
    resize();
    (function applyQueryState(){
      try {
        var raw = new URLSearchParams(window.location.search).get('state');
        if (raw) applyState(JSON.parse(raw));
      } catch (e) {}
    })();
    if (window.desktopOverlay && window.desktopOverlay.onLyricsState) {
      window.desktopOverlay.onLyricsState(applyState);
    }
    requestAnimationFrame(draw);
  </script>
</body>
